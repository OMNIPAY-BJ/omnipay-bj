<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniPay - Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 { font-size: 24px; }
    .logout-btn { 
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }
    
    .admin-info {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .admin-name { font-size: 18px; color: #667eea; font-weight: 600; }
    .admin-balance { font-size: 14px; color: #666; margin-top: 5px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .stat-label {
      font-size: 14px;
      color: #666;
    }
    
    .transactions {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .transactions h2 {
      padding: 20px;
      border-bottom: 1px solid #eee;
      color: #333;
      font-size: 18px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 15px 20px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    
    th {
      background: #f9f9f9;
      font-weight: 600;
      color: #333;
    }
    
    tr:hover { background: #f9f9f9; }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-completed {
      background: #d4edda;
      color: #155724;
    }
    
    .status-pending {
      background: #fff3cd;
      color: #856404;
    }
    
    .amount {
      color: #667eea;
      font-weight: 600;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>💳 OmniPay Admin</h1>
    </div>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <div class="container">
    <div class="admin-info" id="adminInfo">
      <div class="loading">Chargement...</div>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-number" id="totalUsers">-</div>
        <div class="stat-label">Utilisateurs</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalBalance">-</div>
        <div class="stat-label">Solde Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalTxn">-</div>
        <div class="stat-label">Transactions</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalCards">-</div>
        <div class="stat-label">Cartes</div>
      </div>
    </div>

    <div class="transactions">
      <h2>Dernières Transactions</h2>
      <table>
        <thead>
          <tr>
            <th>Utilisateur</th>
            <th>Montant</th>
            <th>Type</th>
            <th>Statut</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="txnTable">
          <tr>
            <td colspan="5" class="loading">Chargement des transactions...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    
    async function loadDashboard() {
      try {
        const response = await fetch(`${API_BASE}/dashboard/admin`);
        const data = await response.json();
        
        if (data.success) {
          // Admin info
          document.getElementById('adminInfo').innerHTML = `
            <div class="admin-name">Bienvenue, ${data.admin.name}</div>
            <div class="admin-balance">Solde actuel: <strong>${data.admin.balance.toLocaleString()} FCFA</strong></div>
          `;
          
          // Stats
          document.getElementById('totalUsers').textContent = data.stats.totalUsers;
          document.getElementById('totalBalance').textContent = (data.stats.totalBalance / 1000).toFixed(1) + 'k';
          document.getElementById('totalTxn').textContent = data.stats.totalTransactions;
          document.getElementById('totalCards').textContent = data.stats.totalCards;
          
          // Transactions
          let txnHtml = '';
          if (data.recentTransactions && data.recentTransactions.length > 0) {
            data.recentTransactions.forEach(txn => {
              txnHtml += `
                <tr>
                  <td>${txn.userId}</td>
                  <td class="amount">${txn.amount.toLocaleString()} ${txn.currency}</td>
                  <td>${txn.description}</td>
                  <td><span class="status-badge status-${txn.status}">${txn.status}</span></td>
                  <td>${new Date(txn.createdAt).toLocaleDateString()}</td>
                </tr>
              `;
            });
          } else {
            txnHtml = '<tr><td colspan="5" style="text-align: center; color: #999;">Aucune transaction</td></tr>';
          }
          document.getElementById('txnTable').innerHTML = txnHtml;
        }
      } catch (error) {
        document.getElementById('adminInfo').innerHTML = '<div class="error">Erreur lors du chargement du dashboard</div>';
        console.error(error);
      }
    }
    
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth.html';
    }
    
    // Load on page load
    loadDashboard();
    
    // Refresh every 30 seconds
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
