<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Pay - OmniPay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #667eea;
      margin-bottom: 10px;
      text-align: center;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      cursor: pointer;
      color: #999;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }
    
    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    
    .qr-result {
      text-align: center;
      margin-top: 30px;
    }
    
    .qr-code {
      max-width: 300px;
      margin: 20px auto;
    }
    
    .qr-code img {
      width: 100%;
      border: 2px solid #667eea;
      border-radius: 12px;
    }
    
    .qr-info {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }
    
    .qr-info p {
      margin: 8px 0;
      color: #666;
      font-size: 14px;
    }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    
    .camera-placeholder {
      width: 100%;
      height: 300px;
      background: #f0f0f0;
      border: 2px dashed #ddd;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 QR Pay</h1>
    <p class="subtitle">Paiements rapides par QR Code</p>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('generate')">Générer</button>
      <button class="tab-btn" onclick="switchTab('scan')">Scanner</button>
    </div>
    
    <div class="message" id="message"></div>
    
    <!-- GENERATE TAB -->
    <div id="generate" class="tab-content active">
      <form onsubmit="generateQR(e)">
        <div class="form-group">
          <label for="amount">Montant (FCFA)</label>
          <input type="number" id="amount" required min="100" placeholder="50000">
        </div>
        
        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="Ex: Paiement pour achats">
        </div>
        
        <button type="submit" class="btn">Générer QR Code</button>
      </form>
      
      <div id="qrResult" style="display: none;">
        <div class="qr-result">
          <p style="color: #667eea; font-weight: 600; margin-bottom: 20px;">Votre QR Code</p>
          <div class="qr-code" id="qrCodeImg"></div>
          <div class="qr-info">
            <p><strong>Montant:</strong> <span id="qrAmount">-</span> FCFA</p>
            <p><strong>Expire dans:</strong> 1 heure</p>
            <p style="font-size: 12px; color: #999; margin-top: 10px;">Les clients peuvent scanner pour payer</p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- SCAN TAB -->
    <div id="scan" class="tab-content">
      <p style="text-align: center; color: #666; margin-bottom: 20px;">Scannez un QR Code OmniPay</p>
      
      <div class="camera-placeholder">
        📷 Caméra (en développement)
      </div>
      
      <button class="btn">Activer la caméra</button>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }
    
    function showMessage(text, type = 'success') {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      setTimeout(() => msg.className = 'message', 5000);
    }
    
    async function generateQR(e) {
      e.preventDefault();
      
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        window.location.href = '/auth.html';
        return;
      }
      
      const amount = document.getElementById('amount').value;
      const description = document.getElementById('description').value;
      
      try {
        const response = await fetch(`${API_BASE}/qr/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: user.id,
            amount,
            description
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          document.getElementById('qrAmount').textContent = data.amount.toLocaleString();
          document.getElementById('qrCodeImg').innerHTML = `<img src="${data.qrCode}" alt="QR Code">`;
          document.getElementById('qrResult').style.display = 'block';
          showMessage('QR Code généré!', 'success');
        } else {
          showMessage(data.error, 'error');
        }
      } catch (error) {
        showMessage('Erreur lors de la génération', 'error');
      }
    }
  </script>
</body>
</html>
