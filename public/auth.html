<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniPay - Authentification</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo h1 {
      color: #667eea;
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }
    
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      cursor: pointer;
      color: #999;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }
    
    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    
    .form-tab { display: none; }
    .form-tab.active { display: block; }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>💳 OmniPay</h1>
    </div>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Connexion</button>
      <button class="tab-btn" onclick="switchTab('register')">Inscription</button>
    </div>
    
    <div class="message" id="message"></div>
    
    <!-- LOGIN FORM -->
    <form id="loginForm" class="form-tab active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" required placeholder="regis@omnipay.com">
      </div>
      
      <div class="form-group">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" name="password" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn">Se connecter</button>
    </form>
    
    <!-- REGISTER FORM -->
    <form id="registerForm" class="form-tab" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="register-name">Nom complet</label>
        <input type="text" id="register-name" name="name" required placeholder="Votre nom">
      </div>
      
      <div class="form-group">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" name="email" required placeholder="vous@exemple.com">
      </div>
      
      <div class="form-group">
        <label for="register-phone">Téléphone</label>
        <input type="tel" id="register-phone" name="phone" required placeholder="+229 XXXXXXXX">
      </div>
      
      <div class="form-group">
        <label for="register-password">Mot de passe</label>
        <input type="password" id="register-password" name="password" required placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn">Créer un compte</button>
    </form>
    
    <div class="back-link">
      <a href="/">← Retour à l'accueil</a>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    
    function switchTab(tab) {
      document.querySelectorAll('.form-tab').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tab + 'Form').classList.add('active');
      event.target.classList.add('active');
    }
    
    function showMessage(text, type = 'success') {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message ' + type;
      setTimeout(() => msg.className = 'message', 5000);
    }
    
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showMessage('Connexion réussie! Redirection...', 'success');
          
          setTimeout(() => {
            if (data.user.role === 'admin') {
              window.location.href = '/dashboard-admin.html';
            } else {
              window.location.href = '/dashboard-client.html';
            }
          }, 1000);
        } else {
          showMessage(data.error, 'error');
        }
      } catch (error) {
        showMessage('Erreur de connexion', 'error');
      }
    }
    
    async function handleRegister(e) {
      e.preventDefault();
      
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const phone = document.getElementById('register-phone').value;
      const password = document.getElementById('register-password').value;
      
      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showMessage('Compte créé! Connectez-vous maintenant.', 'success');
          setTimeout(() => switchTab('login'), 1000);
        } else {
          showMessage(data.error, 'error');
        }
      } catch (error) {
        showMessage('Erreur lors de l\'inscription', 'error');
      }
    }
  </script>
</body>
</html>
