<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement Réussi - OmniPay</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      max-width: 350px;
    }
    .icon { font-size: 60px; margin-bottom: 20px; }
    h1 { color: #28a745; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 20px; }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">Confirmation en cours...</h1>
    <p id="message">Veuillez patienter pendant que nous confirmons votre paiement.</p>
    <a href="/dashboard-client.html">Retour au tableau de bord</a>
  </div>

  <script>
    async function confirmerPaiement() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const pdToken = params.get('token');
      const icon = document.getElementById('icon');
      const title = document.getElementById('title');
      const message = document.getElementById('message');

      if (!sessionId && !pdToken) {
        icon.textContent = '⚠️';
        title.textContent = 'Session introuvable';
        message.textContent = "Impossible de confirmer le paiement sans identifiant de session.";
        return;
      }

      try {
        const endpoint = sessionId
          ? `/api/payments/confirm?session_id=${sessionId}`
          : `/api/payments/paydunya-confirm?token=${pdToken}`;
        const response = await fetch(endpoint);
        const data = await response.json();

        if (data.success && data.status === 'paid') {
          icon.textContent = '✅';
          title.textContent = 'Paiement réussi !';
          message.textContent = 'Votre solde a été mis à jour avec succès.';
        } else {
          icon.textContent = '⚠️';
          title.textContent = 'Paiement en attente';
          message.textContent = "Le paiement n'a pas encore été confirmé.";
        }
      } catch (error) {
        icon.textContent = '⚠️';
        title.textContent = 'Erreur de confirmation';
        message.textContent = 'Une erreur est survenue lors de la confirmation.';
      }
    }
    confirmerPaiement();
  </script>
</body>
</html>
