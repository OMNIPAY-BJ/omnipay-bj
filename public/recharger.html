<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recharger avec Mobile Money - OmniPay</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: #667eea;
      font-size: 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    label { font-weight: 600; display: block; margin-bottom: 6px; margin-top: 16px; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .message { margin-top: 16px; padding: 12px; border-radius: 8px; text-align: center; }
    .message.error { background: #fde2e2; color: #a12727; }
    .note { font-size: 13px; color: #888; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <h1>💳 Recharger avec Mobile Money</h1>

    <label for="amount">Montant (FCFA)</label>
    <input type="number" id="amount" value="1000" min="100">

    <label for="description">Description</label>
    <input type="text" id="description" value="Recharge OmniPay">

    <button id="payBtn" onclick="payer()">Recharger maintenant</button>

    <div id="message"></div>

    <p class="note">Paiement sécurisé via PayDunya — Orange Money, MTN, Moov, carte bancaire.</p>
  </div>

  <script>
    async function payer() {
      const btn = document.getElementById('payBtn');
      const amount = document.getElementById('amount').value;
      const description = document.getElementById('description').value;
      const msg = document.getElementById('message');

      let userId = null;
      const userData = localStorage.getItem('user');
      if (userData) {
        try {
          userId = JSON.parse(userData).id;
        } catch (e) {}
      }

      if (!userId) {
        msg.textContent = 'Veuillez vous connecter avant de payer';
        msg.className = 'message error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Chargement...';

      try {
        const response = await fetch('/api/payments/paydunya-create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, description, userId })
        });

        const data = await response.json();

        if (data.success && data.checkoutUrl) {
          window.location.href = data.checkoutUrl;
        } else {
          msg.textContent = (data.error || 'Erreur inconnue') + (data.details ? ' — ' + data.details : '');
          msg.className = 'message error';
          btn.disabled = false;
          btn.textContent = 'Recharger maintenant';
        }
      } catch (error) {
        msg.textContent = 'Erreur de connexion';
        msg.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Recharger maintenant';
      }
    }
  </script>
</body>
</html>
