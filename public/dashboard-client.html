<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniPay - Mon Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 { font-size: 24px; }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
    }
    
    .balance-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }
    
    .balance-label { font-size: 14px; opacity: 0.9; }
    .balance-amount { font-size: 36px; font-weight: bold; margin: 10px 0; }
    .balance-name { font-size: 14px; opacity: 0.8; }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #ddd;
    }
    
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: none;
      cursor: pointer;
      color: #666;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }
    
    .tab-btn.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .card-item {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .card-number {
      font-size: 18px;
      letter-spacing: 2px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .card-name {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }
    
    .card-details {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #999;
    }
    
    .btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    
    .btn:hover { background: #764ba2; }
    
    .transactions {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 15px 20px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    
    th {
      background: #f9f9f9;
      font-weight: 600;
      color: #333;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .add-card-btn {
      display: inline-block;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .add-card-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); }
  </style>
</head>
<body>
  <div class="header">
    <h1>💳 OmniPay</h1>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <div class="container">
    <div class="balance-card">
      <div class="balance-label">Solde disponible</div>
      <div class="balance-amount" id="balanceAmount">-</div>
      <div class="balance-name" id="userName">Chargement...</div>
    </div>

    <a href="/payer.html" style="display: block; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: 600; margin: 15px 0;">💳 Recharger mon compte</a>
    <a href="/recharger.html" style="display: block; text-align: center; background: #f0f0f0; color: #333; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: 600; margin: 0 0 15px;">📱 Recharger via Mobile Money</a>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('overview')">Aperçu</button>
      <button class="tab-btn" onclick="switchTab('cards')">Cartes</button>
      <button class="tab-btn" onclick="switchTab('transactions')">Transactions</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div id="overview" class="tab-content active">
      <div class="card-grid">
        <div class="card-item">
          <div style="font-size: 14px; color: #999;">Transactions</div>
          <div style="font-size: 28px; font-weight: bold; color: #667eea; margin-top: 10px;" id="totalTxn">-</div>
        </div>
        <div class="card-item">
          <div style="font-size: 14px; color: #999;">Cartes virtuelles</div>
          <div style="font-size: 28px; font-weight: bold; color: #667eea; margin-top: 10px;" id="cardCount">-</div>
        </div>
        <div class="card-item">
          <div style="font-size: 14px; color: #999;">Compte depuis</div>
          <div style="font-size: 16px; font-weight: bold; color: #667eea; margin-top: 10px;" id="accountAge">-</div>
        </div>
      </div>
    </div>

    <!-- CARDS TAB -->
    <div id="cards" class="tab-content">
      <button class="btn add-card-btn" onclick="createCard()">+ Ajouter une carte</button>
      <div class="card-grid" id="cardsList">
        <div class="loading">Chargement des cartes...</div>
      </div>
    </div>

    <!-- TRANSACTIONS TAB -->
    <div id="transactions" class="tab-content">
      <div class="transactions">
        <table>
          <thead>
            <tr>
              <th>Montant</th>
              <th>Description</th>
              <th>Devise</th>
              <th>Statut</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="txnTable">
            <tr><td colspan="5" class="loading">Chargement des transactions...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let currentUser = null;
    let userId = null;
    
    function getUser() {
      const user = localStorage.getItem('user');
      return user ? JSON.parse(user) : null;
    }
    
    async function loadDashboard() {
      currentUser = getUser();
      if (!currentUser) {
        window.location.href = '/auth.html';
        return;
      }
      
      userId = currentUser.id;
      
      try {
        const response = await fetch(`${API_BASE}/dashboard/client/${userId}`);
        const data = await response.json();
        
        if (data.success) {
          document.getElementById('balanceAmount').textContent = data.user.balance.toLocaleString() + ' FCFA';
          document.getElementById('userName').textContent = data.user.name;
          document.getElementById('totalTxn').textContent = data.stats.totalTransactions;
          document.getElementById('cardCount').textContent = data.stats.virtualCards;
          document.getElementById('accountAge').textContent = data.stats.accountAge;
          
          // Transactions
          let txnHtml = '';
          if (data.recentTransactions && data.recentTransactions.length > 0) {
            data.recentTransactions.forEach(txn => {
              txnHtml += `
                <tr>
                  <td>${txn.amount.toLocaleString()} ${txn.currency}</td>
                  <td>${txn.description}</td>
                  <td>${txn.currency}</td>
                  <td>${txn.status}</td>
                  <td>${new Date(txn.createdAt).toLocaleDateString()}</td>
                </tr>
              `;
            });
          } else {
            txnHtml = '<tr><td colspan="5" style="text-align: center; color: #999;">Aucune transaction</td></tr>';
          }
          document.getElementById('txnTable').innerHTML = txnHtml;
          
          // Cards
          if (data.virtualCards && data.virtualCards.length > 0) {
            let cardsHtml = '';
            data.virtualCards.forEach(card => {
              cardsHtml += `
                <div class="card-item">
                  <div class="card-number">${card.cardNumber}</div>
                  <div class="card-name">${card.cardName}</div>
                  <div class="card-details">
                    <span>${card.cardType}</span>
                    <span>${card.expiryDate}</span>
                  </div>
                </div>
              `;
            });
            document.getElementById('cardsList').innerHTML = cardsHtml;
          } else {
            document.getElementById('cardsList').innerHTML = '<div class="loading">Aucune carte virtuelle</div>';
          }
        }
      } catch (error) {
        console.error('Erreur:', error);
      }
    }
    
    async function createCard() {
      const cardName = prompt('Nom de la carte:');
      if (!cardName) return;
      
      try {
        const response = await fetch(`${API_BASE}/cards/create`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, cardName })
        });
        
        const data = await response.json();
        if (data.success) {
          alert('Carte créée avec succès!');
          loadDashboard();
        }
      } catch (error) {
        alert('Erreur lors de la création de la carte');
      }
    }
    
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }
    
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth.html';
    }
    
    loadDashboard();
  </script>
</body>
</html>
