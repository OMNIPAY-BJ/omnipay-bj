<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payer - OmniPay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { color: #667eea; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
    }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .note { font-size: 12px; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💳 Payer avec OmniPay</h1>

    <div class="form-group">
      <label for="amount">Montant (EUR - test)</label>
      <input type="number" id="amount" value="10" min="1">
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" value="Test paiement OmniPay">
    </div>

    <button class="btn" id="payBtn" onclick="payer()">Payer maintenant</button>

    <div class="message" id="message"></div>

    <p class="note">Paiement sécurisé par carte bancaire réelle.</p>
  </div>

  <script>
    async function payer() {
      const btn = document.getElementById('payBtn');
      const amount = document.getElementById('amount').value;
      const description = document.getElementById('description').value;
      const msg = document.getElementById('message');

      let userId = null;
      const userData = localStorage.getItem('user');
      if (userData) {
        try {
          userId = JSON.parse(userData).id;
        } catch (e) {}
      }

      if (!userId) {
        msg.textContent = 'Veuillez vous connecter avant de payer';
        msg.className = 'message error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Chargement...';

      try {
        const response = await fetch('/api/payments/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, description, userId })
        });

        const data = await response.json();

        if (data.success && data.url) {
          window.location.href = data.url;
        } else {
          msg.textContent = data.error || 'Erreur inconnue';
          msg.className = 'message error';
          btn.disabled = false;
          btn.textContent = 'Payer maintenant';
        }
      } catch (error) {
        msg.textContent = 'Erreur de connexion';
        msg.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Payer maintenant';
      }
    }
  </script>
</body>
</html>
