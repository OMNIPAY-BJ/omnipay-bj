<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniPay - Libération Financière</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      text-align: center;
    }
    
    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .tagline {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .button-group {
      display: grid;
      gap: 12px;
    }
    
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #ddd;
    }
    
    .btn-secondary:hover {
      background: #e8e8e8;
      border-color: #667eea;
    }
    
    .features {
      text-align: left;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #eee;
    }
    
    .feature {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      font-size: 14px;
      color: #555;
    }
    
    .feature-icon {
      width: 24px;
      height: 24px;
      background: #667eea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      margin-right: 10px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">💳</div>
    <h1>OmniPay</h1>
    <p class="tagline">La carte bancaire que les banques ne te donneront jamais</p>
    
    <div class="button-group">
      <a href="/auth.html" class="btn btn-primary">Connexion / Inscription</a>
      <a href="/dashboard-admin.html" class="btn btn-secondary">Admin Dashboard</a>
    </div>
    
    <div class="features">
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Paiements instantanés</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Cartes virtuelles</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>Affiliations lucrative</span>
      </div>
      <div class="feature">
        <span class="feature-icon">✓</span>
        <span>100% Africain</span>
      </div>
    </div>
  </div>

  <script>
    // Log when page loads
    console.log('OmniPay Loading...');
    console.log('Backend Status: Check /api/health');
  </script>
</body>
</html>
